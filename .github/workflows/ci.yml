name: NyxCore CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

env:
  PYTHON_VERSION: "3.13"

jobs:

  build-linux:
    name: Build Linux (.deb)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 libglib2.0-0 libxcb-cursor0 \
            libxcb-xinerama0 libxcb-randr0 \
            fakeroot dpkg-dev patchelf

      - name: Install uv + deps
        run: |
          pip install uv
          uv sync
          uv pip install nuitka

      - name: Compile client (Nuitka + PySide6)
        run: |
          uv run python -m nuitka \
            --standalone \
            --assume-yes-for-downloads \
            --plugin-enable=anti-bloat \
            --output-dir=dist/client \
            --output-filename=nyxcore \
            --include-package=src.client \
            src/client/main.py

          mv dist/client/main.dist dist/client/nyxcore.dist

      - name: Package .deb (client)
        run: bash scripts/build_deb.sh client

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: dist/*.deb


  release:
    name: Create GitHub Release
    if: github.ref == 'refs/heads/main'
    needs: [build-linux]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          MSG="${{ github.event.head_commit.message }}"
          VERSION=$(echo "$MSG" | grep -oP '\d+\.\d+\.\d+' | head -1)

          if [ -z "$VERSION" ]; then
            VERSION=$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log "$PREV_TAG"..HEAD --oneline --no-merges)
          else
            LOG=$(git log --oneline --no-merges -20)
          fi

          echo "log<<EOF" >> "$GITHUB_OUTPUT"
          echo "$LOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-deb
          path: release/

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag "v${{ steps.version.outputs.version }}" || true
          git push origin "v${{ steps.version.outputs.version }}" || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: NyxCore v${{ steps.version.outputs.version }}
          body: |
            ## NyxCore v${{ steps.version.outputs.version }}

            ### Changes
            ```
            ${{ steps.changelog.outputs.log }}
            ```

            ### Downloads
            | Platform | Package |
            |----------|--------|
            | Linux    | nyxcore.deb |

            ### Server
            Run server manually:
            ```bash
            uv run python -m src.server.main
            ```
          files: release/*
          generate_release_notes: false