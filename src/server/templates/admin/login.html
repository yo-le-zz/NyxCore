<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NyxCore — Admin Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--blue:#58a6ff;--blue-dark:#1f6feb;--red:#f85149;--font:'JetBrains Mono','Consolas',monospace}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;align-items:center;justify-content:center}
.box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:36px 32px;width:360px}
.logo{text-align:center;margin-bottom:28px}
.logo .icon{font-size:40px;display:block;margin-bottom:10px}
.logo h1{font-size:20px;font-weight:700;color:var(--blue)}
.logo p{font-size:12px;color:var(--muted);margin-top:4px}
label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
input[type=password]{width:100%;background:#0d1117;border:1px solid var(--border);border-radius:6px;padding:10px 12px;color:var(--text);font-family:var(--font);font-size:13px;margin-bottom:16px}
input[type=password]:focus{outline:none;border-color:var(--blue)}
button{width:100%;background:var(--blue-dark);border:none;border-radius:6px;padding:10px;color:#fff;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;letter-spacing:.3px}
button:hover{background:var(--blue)}
.error{background:rgba(248,81,73,.1);border:1px solid var(--red);border-radius:6px;padding:9px 12px;color:var(--red);font-size:12px;margin-bottom:14px}
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <span class="icon">🌑</span>
    <h1>NyxCore</h1>
    <p>Admin Panel — Restricted Access</p>
  </div>

  {% if error %}
  <div class="error">⚠ {{ error }}</div>
  {% endif %}

  <form method="POST" action="/admin/login">
    <label>Master Password</label>
    <input type="password" name="password" placeholder="Enter master password" autofocus>
    <button type="submit">Login →</button>
  </form>
</div>
</body>
</html>
